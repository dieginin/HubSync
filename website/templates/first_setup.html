{% extends "base.html" %}

{% block title %}First Setup - HubSync{% endblock %}

{% block content %}
<form class="w-75 mx-auto" method="POST">
    <div class="text-center mb-2 mt-5">
        <img src="{{ url_for('static', filename='images/hubsync_logo.png') }}" alt="HubSync Logo" width="225">
    </div>
    <h1 align="center">HubSync</h1>
    <h3 align="center" class="mb-4">First Time Setup</h3>
    <p align="center" class="text-nowrap">
        It seems like this is your first time<br />Let's create your admin account
    </p>
    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name"
            style="min-width: 300px;" required>
    </div>
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
    </div>
    <div class="form-group">
        <label for="username">Username</label>
        <input type="text" class="form-control" id="username" name="username" placeholder="Enter a username" required>
    </div>
    <div class="form-group">
        <label for="password1">Password</label>
        <input type="password" class="form-control" id="password1" name="password1" placeholder="Enter a password"
            required>
    </div>
    <div class="form-group">
        <label for="password2">Confirm Password</label>
        <input type="password" class="form-control" id="password2" name="password2" placeholder="Confirm your password"
            required>
    </div>
    <button type="submit" class="btn btn-primary mt-3 mx-auto d-block">Set Up Account</button>
</form>
{% endblock %}
