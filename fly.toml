app = "hubsync"
primary_region = "sjc"

kill_signal = "SIGINT"
kill_timeout = 5


[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

[http_service.concurrency]
type = "connections"
soft_limit = 200
hard_limit = 250

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
memory_mb = 1_024
